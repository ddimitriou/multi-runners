name: PoW Attestation Ledger

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Unique session UUID generated by the local pre-commit hook'
        required: true
        type: string
      pow_checks_hash:
        description: 'SHA256 hash of the command executed for PoW checks'
        required: true
        type: string
      tree_hash:
        description: 'Git tree hash of the staged changes'
        required: true
        type: string
      state:
        description: 'Attestation state: STARTED, PASSED, or FAILED'
        required: true
        type: string

jobs:
  record-attestation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Inputs
        run: |
          echo "📜 Recording PoW Attestation..."
          echo "  Session:     ${{ inputs.session_id }}"
          echo "  Checks Hash: ${{ inputs.pow_checks_hash }}"
          echo "  Tree Hash:   ${{ inputs.tree_hash }}"
          echo "  State:       ${{ inputs.state }}"

          if [[ "${{ inputs.state }}" != "STARTED" && "${{ inputs.state }}" != "PASSED" && "${{ inputs.state }}" != "FAILED" ]]; then
            echo "❌ Invalid state: ${{ inputs.state }}"
            exit 1
          fi

      - name: Create Attestation Record
        run: |
          mkdir -p attestation
          cat << EOF > attestation/record.json
          {
            "session_id": "${{ inputs.session_id }}",
            "pow_checks_hash": "${{ inputs.pow_checks_hash }}",
            "tree_hash": "${{ inputs.tree_hash }}",
            "state": "${{ inputs.state }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat attestation/record.json

      - name: Upload Attestation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "pow-attestation-${{ inputs.session_id }}-${{ inputs.pow_checks_hash }}-${{ inputs.state }}"
          path: attestation/record.json
          retention-days: 90
